<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="acousticBase" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="50%" stop-color="#EDEDED"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <radialGradient id="microHole" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#B0B0B0"/>
      <stop offset="60%" stop-color="#C8C8C8"/>
      <stop offset="100%" stop-color="#DEDEDE"/>
    </radialGradient>
    <pattern id="microPerfRow1" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.3" fill="url(#microHole)"/>
    </pattern>
    <filter id="acousticGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="4" seed="22" result="grain"/>
      <feColorMatrix type="saturate" values="0" in="grain" result="gGrain"/>
      <feComponentTransfer in="gGrain" result="subtle">
        <feFuncR type="linear" slope="0.04" intercept="0"/>
        <feFuncG type="linear" slope="0.04" intercept="0"/>
        <feFuncB type="linear" slope="0.04" intercept="0"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="subtle" mode="multiply"/>
    </filter>
    <filter id="acousticLight">
      <feDiffuseLighting in="SourceGraphic" lighting-color="#FFFFFF" surfaceScale="0.5" diffuseConstant="0.9">
        <feDistantLight azimuth="200" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in2="SourceGraphic" operator="arithmetic" k1="0" k2="0.1" k3="0.9" k4="0"/>
    </filter>
    <radialGradient id="acousticSoftLight" cx="0.45" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.02"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#acousticBase)"/>
  <rect width="800" height="400" fill="url(#acousticBase)" filter="url(#acousticGrain)"/>
  <rect width="800" height="400" fill="url(#microPerfRow1)"/>
  <rect width="800" height="400" fill="url(#acousticSoftLight)"/>
</svg>