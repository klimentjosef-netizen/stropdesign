<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="acousticBase" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#EDF2F6"/>
      <stop offset="50%" stop-color="#E8EDF2"/>
      <stop offset="100%" stop-color="#E3E8EE"/>
    </linearGradient>
    <pattern id="microPerf" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.6" fill="#B0BCC8" opacity="0.35"/>
    </pattern>
    <filter id="acousticGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.0" numOctaves="4" seed="22" result="grain"/>
      <feColorMatrix type="saturate" values="0" in="grain"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.03" intercept="0"/>
        <feFuncG type="linear" slope="0.03" intercept="0"/>
        <feFuncB type="linear" slope="0.03" intercept="0"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <radialGradient id="acousticSoft" cx="0.45" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="0.02"/>
    </radialGradient>
    <!-- Sound wave visualization -->
    <linearGradient id="waveColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3498DB" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3498DB" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#3498DB" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#3498DB" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#acousticBase)"/>
  <rect width="800" height="400" fill="url(#acousticBase)" filter="url(#acousticGrain)"/>
  <rect width="800" height="400" fill="url(#microPerf)"/>
  <rect width="800" height="400" fill="url(#acousticSoft)"/>
  <!-- Subtle sound wave arcs -->
  <circle cx="650" cy="200" r="60" fill="none" stroke="#3498DB" stroke-width="1" opacity="0.06"/>
  <circle cx="650" cy="200" r="90" fill="none" stroke="#3498DB" stroke-width="0.8" opacity="0.04"/>
  <circle cx="650" cy="200" r="120" fill="none" stroke="#3498DB" stroke-width="0.6" opacity="0.03"/>
  <rect width="800" height="400" fill="url(#waveColor)"/>
</svg>