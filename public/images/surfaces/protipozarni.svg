<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="fireBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECE8E4"/>
      <stop offset="50%" stop-color="#E8E4E0"/>
      <stop offset="100%" stop-color="#E4E0DC"/>
    </linearGradient>
    <filter id="fireMatteNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="5" seed="30" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gNoise"/>
      <feComponentTransfer in="gNoise" result="subtleNoise">
        <feFuncR type="linear" slope="0.06" intercept="0.88"/>
        <feFuncG type="linear" slope="0.06" intercept="0.86"/>
        <feFuncB type="linear" slope="0.06" intercept="0.84"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
    </filter>
    <filter id="fireGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="3" seed="25" result="grain"/>
      <feColorMatrix type="saturate" values="0" in="grain"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.03" intercept="0"/>
        <feFuncG type="linear" slope="0.03" intercept="0"/>
        <feFuncB type="linear" slope="0.03" intercept="0"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <radialGradient id="fireSoftLight" cx="0.35" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.02"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#fireBase)"/>
  <rect width="800" height="400" filter="url(#fireMatteNoise)"/>
  <rect width="800" height="400" fill="url(#fireSoftLight)"/>
  <rect width="800" height="400" fill="#E8E4E0" opacity="0.25" filter="url(#fireGrain)"/>
  <!-- Fire-resistant certification mark - subtle watermark style -->
  <g transform="translate(680, 320)" opacity="0.12">
    <!-- Shield outline -->
    <path d="M0,-28 L20,-18 L20,8 C20,22 0,32 0,32 C0,32 -20,22 -20,8 L-20,-18 Z" fill="none" stroke="#888078" stroke-width="1.5"/>
    <!-- Flame icon inside shield -->
    <path d="M0,18 C-4,14 -8,8 -8,2 C-8,-4 -4,-10 0,-16 C4,-10 8,-4 8,2 C8,8 4,14 0,18 Z" fill="none" stroke="#888078" stroke-width="1.2"/>
    <path d="M0,12 C-2,10 -4,6 -4,3 C-4,0 -2,-4 0,-8 C2,-4 4,0 4,3 C4,6 2,10 0,12 Z" fill="#888078" opacity="0.3"/>
    <!-- Small "FR" text -->
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#888078" font-weight="bold" letter-spacing="1">FR</text>
  </g>
  <!-- Second subtle mark -->
  <g transform="translate(720, 360)" opacity="0.08">
    <text text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#888078">B-s1,d0</text>
  </g>
</svg>