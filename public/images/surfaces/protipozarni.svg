<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="fireBase" x1="0" y1="0" x2="0.1" y2="1">
      <stop offset="0%" stop-color="#F0ECEA"/>
      <stop offset="50%" stop-color="#ECE8E5"/>
      <stop offset="100%" stop-color="#E8E4E0"/>
    </linearGradient>
    <filter id="fireNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="5" seed="30" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.05" intercept="0.90"/>
        <feFuncG type="linear" slope="0.05" intercept="0.88"/>
        <feFuncB type="linear" slope="0.05" intercept="0.86"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="fireSoft" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#CC4444" stop-opacity="0.015"/>
    </radialGradient>
    <linearGradient id="fireAccent" x1="0" y1="1" x2="0" y2="0.8">
      <stop offset="0%" stop-color="#CC4444" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#CC4444" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#fireBase)"/>
  <rect width="800" height="400" filter="url(#fireNoise)"/>
  <rect width="800" height="400" fill="url(#fireSoft)"/>
  <rect width="800" height="400" fill="url(#fireAccent)"/>
  <!-- Certification badge -->
  <g transform="translate(700, 330)" opacity="0.15">
    <path d="M0,-24 L18,-15 L18,7 C18,18 0,27 0,27 C0,27 -18,18 -18,7 L-18,-15 Z" fill="none" stroke="#CC4444" stroke-width="1.5"/>
    <path d="M0,14 C-3,11 -6,6 -6,2 C-6,-3 -3,-8 0,-13 C3,-8 6,-3 6,2 C6,6 3,11 0,14 Z" fill="#CC4444" opacity="0.3"/>
  </g>
</svg>