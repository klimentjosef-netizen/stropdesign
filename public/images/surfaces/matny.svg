<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="matteNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="6" seed="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="subtleNoise">
        <feFuncR type="linear" slope="0.08" intercept="0.88"/>
        <feFuncG type="linear" slope="0.08" intercept="0.88"/>
        <feFuncB type="linear" slope="0.08" intercept="0.88"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
    </filter>
    <filter id="matteGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="4" seed="5" result="fineGrain"/>
      <feColorMatrix type="saturate" values="0" in="fineGrain" result="grayGrain"/>
      <feComponentTransfer in="grayGrain" result="grain">
        <feFuncR type="linear" slope="0.03" intercept="0"/>
        <feFuncG type="linear" slope="0.03" intercept="0"/>
        <feFuncB type="linear" slope="0.03" intercept="0"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grain" mode="multiply"/>
    </filter>
    <linearGradient id="matteBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECECEC"/>
      <stop offset="50%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#E4E4E4"/>
    </linearGradient>
    <radialGradient id="matteSoftLight" cx="0.3" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.03"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#matteBase)"/>
  <rect width="800" height="400" filter="url(#matteNoise)"/>
  <rect width="800" height="400" fill="url(#matteSoftLight)"/>
  <rect width="800" height="400" fill="#E8E8E8" opacity="0.3" filter="url(#matteGrain)"/>
</svg>