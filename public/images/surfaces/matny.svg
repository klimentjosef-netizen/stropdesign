<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="matteNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="6" seed="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="subtleNoise">
        <feFuncR type="linear" slope="0.04" intercept="0.92"/>
        <feFuncG type="linear" slope="0.04" intercept="0.91"/>
        <feFuncB type="linear" slope="0.04" intercept="0.90"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="matteBase" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#F0EEEA"/>
      <stop offset="50%" stop-color="#EBE9E5"/>
      <stop offset="100%" stop-color="#E6E4E0"/>
    </linearGradient>
    <radialGradient id="matteSoft" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.02"/>
    </radialGradient>
    <linearGradient id="matteWarm" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#847631" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#847631" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#847631" stop-opacity="0.04"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#matteBase)"/>
  <rect width="800" height="400" filter="url(#matteNoise)"/>
  <rect width="800" height="400" fill="url(#matteSoft)"/>
  <rect width="800" height="400" fill="url(#matteWarm)"/>
</svg>