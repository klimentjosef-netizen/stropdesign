<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="mirrorBase" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E8E8F0"/>
      <stop offset="30%" stop-color="#E0E0E8"/>
      <stop offset="60%" stop-color="#D8D8E2"/>
      <stop offset="100%" stop-color="#E0E0E8"/>
    </linearGradient>
    <linearGradient id="mirrorShine" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="mirrorReflect" x="0" y="0" width="100%" height="100%">
      <feSpecularLighting in="SourceGraphic" specularExponent="60" lighting-color="#F0F0FF" surfaceScale="0.5" result="specular">
        <fePointLight x="350" y="120" z="400"/>
      </feSpecularLighting>
      <feComposite in="specular" in2="SourceGraphic" operator="arithmetic" k1="0" k2="0.2" k3="0.8" k4="0"/>
    </filter>
    <filter id="mirrorSmooth">
      <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="1" seed="3" result="wavyNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="wavyNoise" scale="1.5"/>
    </filter>
    <linearGradient id="reflectedWall" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C8C8D0" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#D0D0D8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E0E0E8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#mirrorBase)"/>
  <rect width="800" height="400" fill="url(#mirrorBase)" filter="url(#mirrorReflect)"/>
  <!-- Reflected room shapes -->
  <rect x="50" y="280" width="700" height="120" fill="url(#reflectedWall)" opacity="0.4"/>
  <line x1="200" y1="280" x2="200" y2="400" stroke="#C0C0C8" stroke-width="1.5" opacity="0.15"/>
  <line x1="400" y1="250" x2="400" y2="400" stroke="#C0C0C8" stroke-width="2" opacity="0.12"/>
  <line x1="600" y1="280" x2="600" y2="400" stroke="#C0C0C8" stroke-width="1.5" opacity="0.15"/>
  <rect x="280" y="300" width="240" height="100" fill="#C8C8D0" opacity="0.06" rx="2"/>
  <!-- Reflected light fixture shape -->
  <ellipse cx="400" cy="160" rx="80" ry="30" fill="#FFFFFF" opacity="0.12"/>
  <ellipse cx="400" cy="160" rx="40" ry="15" fill="#FFFFFF" opacity="0.15"/>
  <!-- Window reflection -->
  <rect x="80" y="100" width="120" height="80" fill="#FFFFFF" opacity="0.05" rx="1"/>
  <line x1="80" y1="140" x2="200" y2="140" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>
  <line x1="140" y1="100" x2="140" y2="180" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>
  <!-- Main highlight -->
  <rect width="800" height="400" fill="url(#mirrorShine)" filter="url(#mirrorSmooth)"/>
  <ellipse cx="360" cy="140" rx="200" ry="100" fill="#FFFFFF" opacity="0.06"/>
</svg>