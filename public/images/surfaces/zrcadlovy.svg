<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="mirrorBase" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#E2E2EE"/>
      <stop offset="30%" stop-color="#DADAE6"/>
      <stop offset="60%" stop-color="#D4D4E2"/>
      <stop offset="100%" stop-color="#DADAE8"/>
    </linearGradient>
    <linearGradient id="mirrorShine" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="25%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="38%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mirrorShine2" x1="0.3" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mirrorHighlight" cx="0.3" cy="0.25" r="0.3">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="reflectedRoom" x1="0" y1="1" x2="0" y2="0.4">
      <stop offset="0%" stop-color="#B0B0C0" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#C0C0D0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D8D8E4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mirrorTint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8888CC" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#8888CC" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#8888CC" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#mirrorBase)"/>
  <!-- Reflected room illusion -->
  <rect x="0" y="240" width="800" height="160" fill="url(#reflectedRoom)"/>
  <line x1="180" y1="260" x2="180" y2="400" stroke="#B0B0C0" stroke-width="1.5" opacity="0.1"/>
  <line x1="400" y1="240" x2="400" y2="400" stroke="#B0B0C0" stroke-width="2" opacity="0.08"/>
  <line x1="620" y1="260" x2="620" y2="400" stroke="#B0B0C0" stroke-width="1.5" opacity="0.1"/>
  <rect x="260" y="290" width="280" height="110" fill="#C0C0D0" opacity="0.05" rx="2"/>
  <!-- Light fixture reflection -->
  <ellipse cx="380" cy="140" rx="90" ry="32" fill="#FFFFFF" opacity="0.15"/>
  <ellipse cx="380" cy="140" rx="45" ry="16" fill="#FFFFFF" opacity="0.2"/>
  <!-- Window reflection -->
  <rect x="60" y="80" width="130" height="90" fill="#FFFFFF" opacity="0.06" rx="1"/>
  <line x1="60" y1="125" x2="190" y2="125" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>
  <line x1="125" y1="80" x2="125" y2="170" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>
  <!-- Main highlights -->
  <rect width="800" height="400" fill="url(#mirrorShine)"/>
  <rect width="800" height="400" fill="url(#mirrorShine2)"/>
  <rect width="800" height="400" fill="url(#mirrorHighlight)"/>
  <rect width="800" height="400" fill="url(#mirrorTint)"/>
</svg>