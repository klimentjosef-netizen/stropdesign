<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="metalBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8D8DC"/>
      <stop offset="20%" stop-color="#CDCDD2"/>
      <stop offset="50%" stop-color="#C8C8CE"/>
      <stop offset="80%" stop-color="#CDCDD2"/>
      <stop offset="100%" stop-color="#D2D2D8"/>
    </linearGradient>
    <filter id="brushed" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.002 1.2" numOctaves="6" seed="7" result="streaks"/>
      <feColorMatrix type="saturate" values="0" in="streaks" result="grayStreaks"/>
      <feComponentTransfer in="grayStreaks">
        <feFuncR type="linear" slope="0.18" intercept="0.76"/>
        <feFuncG type="linear" slope="0.18" intercept="0.76"/>
        <feFuncB type="linear" slope="0.18" intercept="0.78"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="metalSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="15%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="75%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="metalTint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0A0B0" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#C0C0C0" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#A0A0B0" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#metalBase)"/>
  <rect width="800" height="400" filter="url(#brushed)"/>
  <rect width="800" height="400" fill="url(#metalSheen)"/>
  <rect width="800" height="400" fill="url(#metalTint)"/>
  <rect x="0" y="195" width="800" height="2" fill="#FFFFFF" opacity="0.12"/>
  <rect x="0" y="120" width="800" height="1" fill="#FFFFFF" opacity="0.06"/>
  <rect x="0" y="280" width="800" height="1" fill="#FFFFFF" opacity="0.06"/>
</svg>