<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="skyTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="40%" stop-color="#6BA3E0"/>
      <stop offset="70%" stop-color="#8BB8E8"/>
      <stop offset="100%" stop-color="#B0D4F1"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.6" cy="0.3" r="0.25">
      <stop offset="0%" stop-color="#FFFDE8" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FFF5C0" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FFE880" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFE880" stop-opacity="0"/>
    </radialGradient>
    <filter id="cloudBlur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="cloudBlur2">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="printGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="18" result="tex"/>
      <feColorMatrix type="saturate" values="0" in="tex" result="gTex"/>
      <feComponentTransfer in="gTex">
        <feFuncR type="linear" slope="0.02" intercept="0"/>
        <feFuncG type="linear" slope="0.02" intercept="0"/>
        <feFuncB type="linear" slope="0.02" intercept="0"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="printClip"><rect width="800" height="400"/></clipPath>
  </defs>
  <rect width="800" height="400" fill="url(#skyTop)"/>
  <g clip-path="url(#printClip)">
    <!-- Clouds -->
    <ellipse cx="150" cy="180" rx="180" ry="60" fill="#FFFFFF" opacity="0.7" filter="url(#cloudBlur)"/>
    <ellipse cx="200" cy="160" rx="120" ry="45" fill="#FFFFFF" opacity="0.8" filter="url(#cloudBlur2)"/>
    <ellipse cx="550" cy="220" rx="200" ry="55" fill="#FFFFFF" opacity="0.5" filter="url(#cloudBlur)"/>
    <ellipse cx="600" cy="200" rx="130" ry="40" fill="#FFFFFF" opacity="0.6" filter="url(#cloudBlur2)"/>
    <ellipse cx="350" cy="300" rx="160" ry="50" fill="#FFFFFF" opacity="0.4" filter="url(#cloudBlur)"/>
    <ellipse cx="700" cy="120" rx="100" ry="35" fill="#FFFFFF" opacity="0.5" filter="url(#cloudBlur2)"/>
    <!-- Sun glow -->
    <rect width="800" height="400" fill="url(#sun)"/>
  </g>
  <rect width="800" height="400" filter="url(#printGrain)" fill="transparent"/>
</svg>