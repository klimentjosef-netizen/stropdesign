<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="printBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F5F0"/>
      <stop offset="100%" stop-color="#F0ECE4"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B8CA8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4A7A9B" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="grad2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49A6C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4AA7C" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6B8A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A0849F" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7CA87C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5C8A5C" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="printTexture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.4" numOctaves="3" seed="18" result="tex"/>
      <feColorMatrix type="saturate" values="0" in="tex" result="gTex"/>
      <feComponentTransfer in="gTex" result="faint">
        <feFuncR type="linear" slope="0.03" intercept="0"/>
        <feFuncG type="linear" slope="0.03" intercept="0"/>
        <feFuncB type="linear" slope="0.03" intercept="0"/>
        <feFuncA type="constant" value="1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faint" mode="multiply"/>
    </filter>
    <filter id="softEdge">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="artBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="artClip">
      <rect width="800" height="400"/>
    </clipPath>
  </defs>
  <rect width="800" height="400" fill="url(#printBg)"/>
  <g clip-path="url(#artClip)" filter="url(#printTexture)">
    <!-- Abstract flowing shapes -->
    <ellipse cx="200" cy="200" rx="250" ry="180" fill="url(#grad1)" filter="url(#softEdge)"/>
    <ellipse cx="550" cy="250" rx="280" ry="200" fill="url(#grad2)" filter="url(#softEdge)"/>
    <ellipse cx="400" cy="100" rx="200" ry="150" fill="url(#grad3)" filter="url(#softEdge)"/>
    <ellipse cx="650" cy="120" rx="180" ry="130" fill="url(#grad4)" filter="url(#softEdge)"/>
    <!-- Flowing curves -->
    <path d="M0,300 C150,200 300,350 450,250 C600,150 700,300 800,200" fill="none" stroke="#6B8CA8" stroke-width="3" opacity="0.25" filter="url(#artBlur)"/>
    <path d="M0,150 C200,100 350,250 500,180 C650,110 750,200 800,150" fill="none" stroke="#C49A6C" stroke-width="2.5" opacity="0.2" filter="url(#artBlur)"/>
    <path d="M0,250 C100,350 250,150 400,300 C550,200 650,350 800,280" fill="none" stroke="#8B6B8A" stroke-width="2" opacity="0.2" filter="url(#artBlur)"/>
    <!-- Geometric accents -->
    <circle cx="180" cy="160" r="40" fill="none" stroke="#4A7A9B" stroke-width="1.5" opacity="0.2"/>
    <circle cx="620" cy="280" r="55" fill="none" stroke="#C49A6C" stroke-width="1.5" opacity="0.18"/>
    <circle cx="400" cy="200" r="70" fill="none" stroke="#8B6B8A" stroke-width="1" opacity="0.12"/>
    <!-- Small accent dots -->
    <circle cx="300" cy="100" r="4" fill="#6B8CA8" opacity="0.3"/>
    <circle cx="500" cy="320" r="3" fill="#C49A6C" opacity="0.3"/>
    <circle cx="150" cy="350" r="5" fill="#8B6B8A" opacity="0.2"/>
    <circle cx="680" cy="80" r="3.5" fill="#7CA87C" opacity="0.25"/>
  </g>
</svg>