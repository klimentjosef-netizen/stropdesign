<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="glossyBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F3E5"/>
      <stop offset="30%" stop-color="#F5F0E0"/>
      <stop offset="60%" stop-color="#F2EDDB"/>
      <stop offset="100%" stop-color="#EDE8D5"/>
    </linearGradient>
    <linearGradient id="glossyShine1" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glossyShine2" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glossyHighlight" cx="0.35" cy="0.3" r="0.5" fx="0.35" fy="0.3">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glossyReflection" x="0" y="0" width="100%" height="100%">
      <feSpecularLighting in="SourceGraphic" specularExponent="40" lighting-color="#FFFFFF" surfaceScale="1" result="specular">
        <fePointLight x="300" y="100" z="200"/>
      </feSpecularLighting>
      <feComposite in="specular" in2="SourceGraphic" operator="arithmetic" k1="0" k2="0.15" k3="0.85" k4="0"/>
    </filter>
    <filter id="glossySmooth">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="2" seed="1" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#glossyBase)"/>
  <rect width="800" height="400" fill="url(#glossyShine1)" filter="url(#glossySmooth)"/>
  <rect width="800" height="400" fill="url(#glossyShine2)"/>
  <rect width="800" height="400" fill="url(#glossyHighlight)"/>
  <ellipse cx="320" cy="150" rx="250" ry="80" fill="#FFFFFF" opacity="0.12"/>
  <line x1="100" y1="350" x2="700" y2="50" stroke="#FFFFFF" stroke-width="60" opacity="0.06"/>
  <line x1="200" y1="400" x2="800" y2="100" stroke="#FFFFFF" stroke-width="30" opacity="0.04"/>
</svg>